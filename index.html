<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYTEX SHOP APP</title>
    <!-- Подключаем скрипт Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; color: #0088cc; margin-bottom: 20px; }
        .card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #0088cc;
        }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header">💎 KRYTEX SHOP 💎</h2>
        
        <div class="card">
            <div>
                <strong>Меф Crystal VHQ</strong><br>
                <span>15 000 ₸</span>
            </div>
            <button onclick="buy('Меф Crystal', 15000)">Купить</button>
        </div>

        <div class="card">
            <div>
                <strong>Шишки Amnesia</strong><br>
                <span>12 500 ₸</span>
            </div>
            <button onclick="buy('Шишки Amnesia', 12500)">Купить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        function buy(name, price) {
            // Отправляем данные обратно в бот
            tg.sendData(`item_buy:${name}:${price}`);
            tg.close(); // Закрываем аппку после выбора
        }
    </script>
</body>
</html>
