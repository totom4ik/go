<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRYTEX PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #08050a;
            --card: #120d1a;
            --accent: #ff2d78;
            --blue: #00d4ff;
            --text: #ffffff;
            --dim: #9b94a7;
            --success: #00ffa3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fixed Header */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(8, 5, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-bottom: 1px solid #2d2438;
            text-align: center;
        }

        .btn-op {
            background: linear-gradient(90deg, var(--accent), #ff5e9e);
            color: white; border: none; width: 100%;
            padding: 12px; border-radius: 12px;
            font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 0 20px rgba(255, 45, 120, 0.4);
        }

        .container { padding: 15px; padding-bottom: 100px; }

        /* Typography */
        h2 { font-size: 22px; margin-bottom: 5px; color: var(--blue); }
        .sub { font-size: 12px; color: var(--dim); margin-bottom: 20px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-item {
            background: var(--card);
            border: 1px solid #2d2438;
            padding: 20px 10px;
            border-radius: 16px;
            text-align: center;
            transition: 0.3s;
            font-weight: 600;
        }
        .card-item:active { border-color: var(--accent); transform: scale(0.95); background: #1a1425; }

        /* Product Card */
        .prod-card {
            background: var(--card);
            border-radius: 18px;
            border: 1px solid #2d2438;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .prod-img { height: 150px; background: #1a1425; display: flex; align-items: center; justify-content: center; }
        .prod-body { padding: 15px; }
        .prod-price { color: var(--accent); font-size: 20px; font-weight: 800; }
        .btn-buy { background: var(--blue); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        /* Payment Screen */
        .pay-window {
            background: #150f1d;
            border: 2px dashed var(--blue);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }
        .wallet { background: #000; padding: 12px; border-radius: 10px; margin: 15px 0; color: var(--success); font-family: monospace; font-size: 16px; border: 1px solid #2d2438; }

        /* Bottom Nav */
        .bot-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #120d1a; display: flex;
            padding: 12px 0; border-top: 1px solid #2d2438;
        }
        .nav-link { flex: 1; text-align: center; color: var(--dim); font-size: 10px; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 4px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-op" onclick="tg.openTelegramLink('https://t.me/krytex_kzz')">СВЯЗЬ С ОПЕРАТОРОМ</button>
</div>

<div class="container">
    <div id="shop-view">
        <div id="step-1">
            <h2>ЛОКАЦИЯ</h2>
            <p class="sub">Выберите ваш город для поиска кладов</p>
            <div class="grid" id="city-list"></div>
        </div>

        <div id="step-2" class="hidden">
            <button onclick="showStep(1)" style="background:none; color:var(--blue); border:none; margin-bottom:10px;">← Назад</button>
            <h2 id="title-city">Районы</h2>
            <div class="grid" id="dist-list"></div>
        </div>

        <div id="step-3" class="hidden">
            <button onclick="showStep(2)" style="background:none; color:var(--blue); border:none; margin-bottom:10px;">← Назад</button>
            <h2 id="title-dist">Витрина</h2>
            <div id="prod-list"></div>
        </div>

        <div id="step-4" class="hidden">
            <div class="pay-window">
                <h3 style="margin-top:0">ОПЛАТА ЗАКАЗА</h3>
                <p style="font-size:12px">Сумма к зачислению:</p>
                <div class="prod-price" id="pay-sum">0 ₸</div>
                <p style="font-size:11px; margin-top:15px;">Реквизиты (KaspI / Crypto):</p>
                <div class="wallet">4400 5566 7788 9900</div>
                <p style="font-size:10px; color:var(--dim)">После перевода нажмите кнопку «Я ОПЛАТИЛ» и отправьте чек в бот.</p>
            </div>
            <button class="btn-op" style="margin-top:20px; background:var(--success); color:black;" onclick="finish()">Я ОПЛАТИЛ</button>
            <button onclick="showStep(1)" style="background:none; color:red; border:none; width:100%; margin-top:15px;">ОТМЕНИТЬ</button>
        </div>
    </div>

    <div id="prof-view" class="hidden">
        <h2>ПРОФИЛЬ</h2>
        <div class="card-item" style="width:100%; text-align:left; box-sizing:border-box;">
            <p>🆔 ID: <span id="u-id">...</span></p>
            <p>💰 БАЛАНС: 0 ₸</p>
            <p>💎 СТАТУС: CLIENT</p>
        </div>
    </div>
</div>

<div class="bot-nav">
    <div class="nav-link active" onclick="switchView('shop', this)"><i class="fa fa-shoppy"></i>МАРКЕТ</div>
    <div class="nav-link" onclick="switchView('prof', this)"><i class="fa fa-user"></i>АККАУНТ</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = "#08050a";

    const data = {
        "Алматы": ["Медеуский", "Алмалинский", "Бостандыкский", "Турксибский"],
        "Астана": ["Есильский", "Сарыарка", "Алматы"],
        "Караганда": ["Казыбек Би", "Майкудук"]
    };

    const prods = [
        { n: "❄️ МЕФ Crystal VHQ", p: "15500", w: "1г" },
        { n: "🍀 Шишки Amnesia", p: "22000", w: "2г" }
    ];

    let order = {};

    function init() {
        const cl = document.getElementById('city-list');
        Object.keys(data).forEach(c => {
            const d = document.createElement('div');
            d.className = 'card-item';
            d.innerText = c;
            d.onclick = () => { order.c = c; showStep(2); };
            cl.appendChild(d);
        });
        document.getElementById('u-id').innerText = tg.initDataUnsafe.user?.id || "N/A";
    }

    function showStep(s) {
        [1,2,3,4].forEach(x => document.getElementById('step-'+x).classList.add('hidden'));
        document.getElementById('step-'+s).classList.remove('hidden');
        
        if(s===2) {
            document.getElementById('title-city').innerText = order.c;
            const dl = document.getElementById('dist-list'); dl.innerHTML = '';
            data[order.c].forEach(r => {
                const d = document.createElement('div'); d.className = 'card-item'; d.innerText = r;
                d.onclick = () => { order.r = r; showStep(3); };
                dl.appendChild(d);
            });
        }
        if(s===3) {
            document.getElementById('title-dist').innerText = order.r;
            const pl = document.getElementById('prod-list'); pl.innerHTML = '';
            prods.forEach(p => {
                pl.innerHTML += `<div class="prod-card"><div class="prod-body">
                    <b>${p.n}</b> (${p.w})<br><br>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="prod-price">${p.p} ₸</span>
                    <button class="btn-buy" onclick="setPay('${p.n}','${p.p}')">КУПИТЬ</button>
                    </div></div></div>`;
            });
        }
    }

    function setPay(n, p) { order.n = n; order.p = p; showStep(4); document.getElementById('pay-sum').innerText = p + ' ₸'; }

    function finish() {
        tg.sendData(`DONE|${order.c}|${order.r}|${order.n}|${order.p}`);
        tg.close();
    }

    function switchView(v, el) {
        document.getElementById('shop-view').classList.add('hidden');
        document.getElementById('prof-view').classList.add('hidden');
        document.getElementById(v+'-view').classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    }

    init();
</script>
</body>
</html>
