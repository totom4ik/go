<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRYTEX PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #08050a; --card: #120d1a; --accent: #ff2d78; --blue: #00d4ff; --text: #ffffff; --dim: #9b94a7; --success: #00ffa3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(8, 5, 10, 0.95); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #2d2438; text-align: center; }
        .btn-op { background: linear-gradient(90deg, var(--accent), #ff5e9e); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 800; text-transform: uppercase; box-shadow: 0 0 20px rgba(255, 45, 120, 0.4); }
        .container { padding: 15px; padding-bottom: 100px; }
        h2 { font-size: 20px; color: var(--blue); margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .card-item { background: var(--card); border: 1px solid #2d2438; padding: 20px 10px; border-radius: 16px; text-align: center; transition: 0.2s; font-weight: 600; }
        .card-item:active { border-color: var(--accent); transform: scale(0.95); }
        .prod-card { background: var(--card); border-radius: 18px; border: 1px solid #2d2438; margin-bottom: 12px; padding: 15px; }
        .prod-price { color: var(--accent); font-size: 18px; font-weight: 800; }
        .btn-buy { background: var(--blue); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .pay-window { background: #150f1d; border: 2px dashed var(--blue); padding: 20px; border-radius: 20px; text-align: center; }
        .wallet { background: #000; padding: 12px; border-radius: 10px; margin: 15px 0; color: var(--success); font-family: monospace; border: 1px solid #2d2438; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #120d1a; display: flex; padding: 12px 0; border-top: 1px solid #2d2438; }
        .nav-link { flex: 1; text-align: center; color: var(--dim); font-size: 10px; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header"><button class="btn-op" onclick="tg.openTelegramLink('https://t.me/krytex_kzz')">СВЯЗЬ С ОПЕРАТОРОМ</button></div>
    <div class="container">
        <div id="shop-view">
            <div id="step-1"><h2>ЛОКАЦИЯ</h2><p style="color:var(--dim); font-size:12px;">Выберите город КЗ:</p><div class="grid" id="city-list"></div></div>
            <div id="step-2" class="hidden"><button onclick="showStep(1)" style="background:none; color:var(--blue); border:none; margin-bottom:10px;">← Назад</button><h2 id="t-city"></h2><div class="grid" id="dist-list"></div></div>
            <div id="step-3" class="hidden"><button onclick="showStep(2)" style="background:none; color:var(--blue); border:none; margin-bottom:10px;">← Назад</button><h2 id="t-dist"></h2><div id="prod-list"></div></div>
            <div id="step-4" class="hidden">
                <div class="pay-window"><h3>ОПЛАТА</h3><p id="pay-name" style="font-size:13px;"></p><div class="prod-price" id="pay-sum"></div><div class="wallet">4400 1234 5678 9012</div><p style="font-size:10px; color:var(--dim)">Переведите на карту и нажмите «Я ОПЛАТИЛ»</p></div>
                <button class="btn-op" style="margin-top:20px; background:var(--success); color:black;" onclick="finish()">Я ОПЛАТИЛ</button>
            </div>
        </div>
        <div id="prof-view" class="hidden"><h2>ПРОФИЛЬ</h2><div class="card-item" style="width:100%; text-align:left;">ID: <span id="u-id"></span><br>Статус: Premium</div></div>
    </div>
    <div class="nav">
        <div class="nav-link active" onclick="switchView('shop', this)"><i class="fa fa-shopping-bag"></i>МАРКЕТ</div>
        <div class="nav-link" onclick="switchView('prof', this)"><i class="fa fa-user"></i>АККАУНТ</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const data = {
            "Алматы": ["Алмалинский", "Медеуский", "Бостандыкский", "Ауэзовский"],
            "Астана": ["Есильский", "Сарыарка", "Алматы", "Байконур"],
            "Караганда": ["Казыбек Би", "Майкудук", "Юго-Восток"],
            "Шымкент": ["Абайский", "Аль-Фараби"],
            "Актобе": ["Старый город", "11-12 мкр"]
        };
        const prods = [{n:"❄️ МЕФ Crystal VHQ", p:"15500", w:"1г"}, {n:"🍀 Шишки AK-47", p:"23000", w:"2г"}, {n:"🍓 Ecstasy", p:"18000", w:"2шт"}];
        let order = {};
        function init() {
            const cl = document.getElementById('city-list');
            Object.keys(data).forEach(c => {
                let d = document.createElement('div'); d.className='card-item'; d.innerText=c;
                d.onclick=()=>{ order.c=c; showStep(2); }; cl.appendChild(d);
            });
            document.getElementById('u-id').innerText = tg.initDataUnsafe.user?.id || "N/A";
        }
        function showStep(s) {
            [1,2,3,4].forEach(x => document.getElementById('step-'+x).classList.add('hidden'));
            document.getElementById('step-'+s).classList.remove('hidden');
            if(s==2) {
                document.getElementById('t-city').innerText = order.c;
                const dl = document.getElementById('dist-list'); dl.innerHTML='';
                data[order.c].forEach(r => {
                    let d = document.createElement('div'); d.className='card-item'; d.innerText=r;
                    d.onclick=()=>{ order.r=r; showStep(3); }; dl.appendChild(d);
                });
            }
            if(s==3) {
                document.getElementById('t-dist').innerText = order.r;
                const pl = document.getElementById('prod-list'); pl.innerHTML='';
                prods.forEach(p => {
                    pl.innerHTML += `<div class="prod-card"><b>${p.n}</b> (${p.w})<br><br><div style="display:flex; justify-content:space-between; align-items:center;"><span class="prod-price">${p.p} ₸</span><button class="btn-buy" onclick="setPay('${p.n}','${p.p}')">КУПИТЬ</button></div></div>`;
                });
            }
        }
        function setPay(n,p) { order.n=n; order.p=p; showStep(4); document.getElementById('pay-name').innerText=n; document.getElementById('pay-sum').innerText=p+' ₸'; }
        function finish() { tg.sendData(`DONE|${order.c}|${order.r}|${order.n}|${order.p}`); tg.close(); }
        function switchView(v, el) {
            document.getElementById('shop-view').classList.add('hidden'); document.getElementById('prof-view').classList.add('hidden');
            document.getElementById(v+'-view').classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active');
        }
        init();
    </script>
</body>
</html>
