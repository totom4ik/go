<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRYTEX PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0810;
            --card-bg: #16111d;
            --accent-color: #ff2d78;
            --text-main: #ffffff;
            --text-dim: #9b94a7;
            --border: #2d2438;
            --success: #00ffa3;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            user-select: none;
        }

        /* Шапка */
        .top-header {
            padding: 15px;
            background: linear-gradient(180deg, #1a1225 0%, var(--bg-color) 100%);
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        .btn-operator {
            background: var(--accent-color);
            color: #fff; border: none; width: 100%;
            padding: 12px; border-radius: 10px;
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 45, 120, 0.2);
        }

        .container { padding: 15px; padding-bottom: 100px; }
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Элементы интерфейса */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .item-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; text-align: center; font-size: 14px;
        }
        .item-card:active { border-color: var(--accent-color); background: #1f1829; }

        .product-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; margin-bottom: 12px; overflow: hidden;
        }
        .product-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Экран оплаты */
        .payment-box {
            background: #1a1422; border: 2px dashed var(--accent-color);
            padding: 20px; border-radius: 15px; text-align: center; margin-top: 10px;
        }
        .wallet-addr {
            background: #000; padding: 10px; border-radius: 8px;
            margin: 10px 0; color: var(--success); font-family: monospace; font-size: 16px;
        }

        .btn-main { background: var(--accent-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        .btn-cancel { background: #2d2438; color: #ff4d4d; border: none; padding: 12px; width: 100%; border-radius: 12px; margin-top: 10px; }

        /* Нижняя нава */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 17, 29, 0.98); display: flex;
            padding: 10px 0; border-top: 1px solid var(--border);
        }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 10px; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="top-header">
    <button class="btn-operator" onclick="tg.openTelegramLink('https://t.me/krytex_kzz')">ОПЕРАТОР</button>
</div>

<div class="container">
    
    <div id="view-shop" class="view-section active">
        <div id="step-cities">
            <h3>📍 Выберите город</h3>
            <div class="grid" id="city-list"></div>
        </div>

        <div id="step-districts" style="display:none">
            <button class="btn-cancel" style="color:white" onclick="goStep('cities')">← К городам</button>
            <h3 id="city-title">Районы</h3>
            <div class="grid" id="district-list"></div>
        </div>

        <div id="step-products" style="display:none">
            <button class="btn-cancel" style="color:white" onclick="goStep('districts')">← К районам</button>
            <h3 id="district-title">Товары</h3>
            <div id="product-list"></div>
        </div>

        <div id="step-payment" style="display:none">
            <h3 style="text-align: center;">Оплата заказа</h3>
            <div class="payment-box">
                <p style="font-size: 14px; margin: 0;">Переведите сумму:</p>
                <h2 id="pay-amount" style="color: var(--accent-color); margin: 10px 0;">0 ₸</h2>
                <p style="font-size: 12px;">На карту/кошелек:</p>
                <div class="wallet-addr" id="pay-wallet">4400 1234 5678 9012</div>
                <p style="font-size: 11px; color: var(--text-dim);">У вас есть 30 минут на оплату. После оплаты нажмите кнопку ниже.</p>
            </div>
            <button class="btn-main" onclick="confirmPayment()">✅ Я ОПЛАТИЛ</button>
            <button class="btn-cancel" onclick="goStep('cities')">❌ ОТМЕНИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="view-profile" class="view-section"><h3>Профиль</h3><p>ID: <span id="uid"></span></p></div>
    <div id="view-reviews" class="view-section"><h3>Отзывы</h3></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('shop', this)"><i class="fa fa-shopping-cart"></i>Маркет</div>
    <div class="nav-item" onclick="switchTab('profile', this)"><i class="fa fa-user"></i>Профиль</div>
    <div class="nav-item" onclick="switchTab('reviews', this)"><i class="fa fa-star"></i>Отзывы</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const db = {
        "Алматы": ["Медеуский", "Алмалинский", "Бостандыкский"],
        "Астана": ["Есильский", "Сарыарка", "Алматы"],
        "Шымкент": ["Абайский", "Каратауский"]
    };

    const products = [
        { name: "✨ МЕФ VHQ ✨", weight: "1г", price: "15500" },
        { name: "🌿 Шишки AK-47 🌿", weight: "2г", price: "22000" },
        { name: "🍓 Ecstasy 🍓", weight: "2шт", price: "16000" }
    ];

    let currentOrder = {};

    function init() {
        const cityGrid = document.getElementById('city-list');
        Object.keys(db).forEach(city => {
            const d = document.createElement('div');
            d.className = 'item-card';
            d.innerText = city;
            d.onclick = () => { currentOrder.city = city; goStep('districts'); };
            cityGrid.appendChild(d);
        });
        document.getElementById('uid').innerText = tg.initDataUnsafe.user?.id || "N/A";
    }

    function goStep(step) {
        document.getElementById('step-cities').style.display = 'none';
        document.getElementById('step-districts').style.display = 'none';
        document.getElementById('step-products').style.display = 'none';
        document.getElementById('step-payment').style.display = 'none';

        if(step === 'cities') document.getElementById('step-cities').style.display = 'block';
        
        if(step === 'districts') {
            document.getElementById('step-districts').style.display = 'block';
            document.getElementById('city-title').innerText = currentOrder.city;
            const dGrid = document.getElementById('district-list');
            dGrid.innerHTML = '';
            db[currentOrder.city].forEach(dist => {
                const d = document.createElement('div');
                d.className = 'item-card';
                d.innerText = dist;
                d.onclick = () => { currentOrder.district = dist; goStep('products'); };
                dGrid.appendChild(d);
            });
        }

        if(step === 'products') {
            document.getElementById('step-products').style.display = 'block';
            document.getElementById('district-title').innerText = currentOrder.district;
            const pList = document.getElementById('product-list');
            pList.innerHTML = '';
            products.forEach(p => {
                pList.innerHTML += `
                    <div class="product-card" onclick="startPay('${p.name}', '${p.price}')">
                        <div class="product-info">
                            <span><b>${p.name}</b> (${p.weight})</span>
                            <span style="color:var(--accent-color)">${p.price} ₸</span>
                        </div>
                    </div>
                `;
            });
        }
    }

    function startPay(name, price) {
        currentOrder.product = name;
        currentOrder.price = price;
        document.getElementById('step-products').style.display = 'none';
        document.getElementById('step-payment').style.display = 'block';
        document.getElementById('pay-amount').innerText = price + " ₸";
    }

    function confirmPayment() {
        tg.showConfirm("Вы точно оплатили заказ?", (ok) => {
            if(ok) {
                // Отправляем данные в бот
                const data = `PAID|${currentOrder.city}|${currentOrder.district}|${currentOrder.product}|${currentOrder.price}`;
                tg.sendData(data);
                tg.close();
            }
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        el.classList.add('active');
    }

    init();
</script>
</body>
</html>
