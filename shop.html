<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 Царство Аида 🔱</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d0914; --card: #171125; --accent: #9d00ff; --blue: #00d4ff; --text: #ffffff; --dim: #8b809c; --success: #00ffa3; --danger: #ff2d55; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(13, 9, 20, 0.95); backdrop-filter: blur(10px); padding: 12px; border-bottom: 2px solid var(--accent); text-align: center; }
        .btn-op { background: linear-gradient(90deg, var(--accent), #bd5eff); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 800; text-transform: uppercase; box-shadow: 0 0 15px rgba(157, 0, 255, 0.4); cursor: pointer; }
        .container { padding: 15px; padding-bottom: 100px; }
        h2 { font-size: 18px; color: var(--blue); margin-bottom: 15px; }
        .prod-card { background: var(--card); border-radius: 16px; border: 1px solid #2d2144; margin-bottom: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .prod-price { color: var(--success); font-size: 16px; font-weight: 800; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #140e22; display: flex; padding: 12px 0; border-top: 1px solid #2d2144; z-index: 1000; }
        .nav-link { flex: 1; text-align: center; color: var(--dim); cursor: pointer; font-size: 10px; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <button class="btn-op" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/krytex_kzz')">🔱 ЦАРСТВО АИДА — ОПЕРАТОР 🔱</button>
    </div>
    
    <div class="container">
        <div id="shop-view">
            <h2>📦 КАТАЛОГ ТОВАРОВ</h2>
            <div id="prod-list">Загрузка товаров...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://aida-reviews.duckdns.org/api/products';
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Основная функция загрузки товаров с твоего сервера
        async function loadProducts() {
            const list = document.getElementById('prod-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = "";
                
                // Проходим по городам и товарам из JSON
                // Структура должна быть: { "cities": { "Астана": [ {name: "Товар", price: "1000"}, ... ] } }
                if (!data.cities) { list.innerHTML = "Товаров нет."; return; }

                for (let city in data.cities) {
                    list.innerHTML += `<h3 style="color:var(--blue); font-size: 14px; margin-top:20px;">📍 ${city}</h3>`;
                    data.cities[city].forEach(p => {
                        list.innerHTML += `
                            <div class="prod-card">
                                <div class="prod-info">
                                    <div style="font-weight:bold;">${p.name}</div>
                                    <div class="prod-price">${p.price} ₸</div>
                                </div>
                                <button class="btn-buy" onclick="buy('${p.name}', '${p.price}', '${city}')">Купить</button>
                            </div>`;
                    });
                }
            } catch (e) {
                list.innerHTML = "Ошибка подключения к серверу. Попробуйте позже.";
            }
        }

        function buy(name, price, city) {
            // Отправляем данные обратно в бота
            tg.sendData(`DONE|${city}|Район уточнит опер|${name}|${price} ₸`);
            tg.close();
        }

        loadProducts();
    </script>
</body>
</html>
