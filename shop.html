<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 Царство Аида 🔱</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d0914; --card: #171125; --accent: #9d00ff; --blue: #00d4ff; --text: #ffffff; --dim: #8b809c; --success: #00ffa3; --danger: #ff2d55; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(13, 9, 20, 0.95); backdrop-filter: blur(10px); padding: 12px; border-bottom: 2px solid var(--accent); text-align: center; }
        .btn-op { background: linear-gradient(90deg, #9d00ff, #00d4ff); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 90%; margin: 10px auto; display: block; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; box-shadow: 0 0 15px rgba(157, 0, 255, 0.4); }
        .container { padding: 15px; padding-bottom: 80px; }
        .nav-tabs { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { background: none; border: none; color: var(--dim); font-size: 14px; font-weight: 600; padding: 6px 12px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--blue); }
        .page { display: none; }
        .page.active { display: block; }
        .city-select, .type-select { width: 100%; padding: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; font-size: 15px; margin-bottom: 15px; outline: none; }
        .product-card { background: var(--card); border-radius: 14px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .prod-info { display: flex; flex-direction: column; gap: 5px; }
        .prod-title { font-weight: 700; font-size: 16px; color: #fff; }
        .prod-meta { font-size: 12px; color: var(--dim); }
        .prod-price { font-size: 15px; color: var(--success); font-weight: 700; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .review-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.02); }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .review-user { color: var(--blue); font-weight: 600; }
        .review-stars { color: #ffca28; }
        .review-text { font-size: 13px; color: #e0e0e0; line-height: 1.4; }
        .review-img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
        .review-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 6px; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0; font-size:18px; letter-spacing:1px;">🔱 ЦАРСТВО АИДА 🔱</h3>
    </div>

    <button class="btn-op" onclick="openOperator()">💬 Связаться с Оператором</button>

    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchPage('shop')"><i class="fas fa-shopping-cart"></i> Витрина</button>
            <button class="tab-btn" onclick="switchPage('reviews')"><i class="fas fa-comment-dots"></i> Отзывы</button>
        </div>

        <div id="page-shop" class="page active">
            <select class="city-select" id="city-selector" onchange="filterProducts()">
                </select>

            <select class="type-select" id="type-selector" onchange="filterProducts()">
                <option value="клады">🏙️ Готовые Клады (Город)</option>
                <option value="доставка">📦 Новая Почта / Такси</option>
            </select>

            <div id="products-container">
                </div>
        </div>

        <div id="page-reviews" class="page">
            <div id="reviews-container">
                <p style="color:var(--dim); font-size:13px; text-align:center;">Загрузка честных отзывов...</p>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем окно на максимум

        // Вытаскиваем реальные данные пользователя
        const tgUser = tg.initDataUnsafe?.user;
        const currentUserId = tgUser ? tgUser.id : "0";
        const currentUserName = tgUser ? (tgUser.username || tgUser.first_name) : "Браузер";

        const BASE_API_URL = "https://aida-reviews.duckdns.org";

        // Функция отправки логов
        function sendLog(logText) {
            fetch(`${BASE_API_URL}/api/log`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    uid: currentUserId,
                    user: currentUserName,
                    log: logText
                })
            }).catch(err => console.log("Log error:", err));
        }

        // Лог при открытии магазина
        sendLog("Открыл витрину WebApp магазина");

        function openOperator() {
            sendLog("Нажал кнопку: Связаться с Оператором");
            tg.openTelegramLink("https://t.me/krytex_kzz");
        }

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`page-${page}`).classList.add('active');
            event.currentTarget.classList.add('active');

            if(page === 'reviews') {
                sendLog("Перешел на вкладку 'Отзывы'");
                loadLiveReviews();
            } else {
                sendLog("Вернулся на вкладку 'Витрина'");
            }
        }

        const cities = ["Алматы", "Астана", "Шымкент", "Караганда", "Актобе", "Тараз", "Павлодар", "Усть-Каменогорск"];
        const productsData = [
            { name: "Мефедрон (Кристалл)", price: "12.000 ₸", weight: "1гр" },
            { name: "Мефедрон (Кристалл)", price: "22.000 ₸", weight: "2гр" },
            { name: "A-PVP (Скорость)", price: "11.500 ₸", weight: "1гр" },
            { name: "Шишки (Гашиш / Бошки)", price: "9.000 ₸", weight: "2гр" },
            { name: "Кокаин (Original 94%)", price: "65.000 ₸", weight: "0.5гр" }
        ];

        function initCities() {
            let selector = document.getElementById('city-selector');
            selector.innerHTML = '';
            cities.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c;
                opt.innerText = `📍 ${c}`;
                selector.appendChild(opt);
            });
            filterProducts();
        }

        function filterProducts() {
            let city = document.getElementById('city-selector').value;
            let type = document.getElementById('type-selector').value;
            let container = document.getElementById('products-container');
            container.innerHTML = '';

            productsData.forEach(p => {
                let card = document.createElement('div');
                card.className = "product-card";
                card.innerHTML = `
                    <div class="prod-info">
                        <span class="prod-title">${p.name}</span>
                        <span class="prod-meta">Тип: ${type} | Вес: ${p.weight}</span>
                        <span class="prod-price">${p.price}</span>
                    </div>
                    <button class="btn-buy" onclick="buyProduct('${p.name}', '${p.weight}', '${city}')">Купить</button>
                `;
                container.appendChild(card);
            });
        }

        function buyProduct(name, weight, city) {
            sendLog(`Нажал 'Купить': ${name} [${weight}] (Город: ${city})`);
            tg.showPopup({
                title: 'Оформление заказа',
                message: `Вы выбрали ${name} (${weight}). Перейти к оплате и получению адреса у оператора?`,
                buttons: [{id: 'ok', type: 'default', text: 'Да, перейти'}]
            }, function(buttonId) {
                if (buttonId === 'ok') {
                    sendLog(`Подтвердил покупку, перенаправлен на оператора: ${name}`);
                    tg.openTelegramLink("https://t.me/krytex_kzz");
                }
            });
        }

        function loadLiveReviews() {
            let container = document.getElementById('reviews-container');
            fetch(`${BASE_API_URL}/api/reviews`)
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = '';
                    if(!data || data.length === 0) {
                        container.innerHTML = "<p style='color:var(--dim); font-size:12px;'>Отзывов пока нет.</p>";
                        return;
                    }
                    data.forEach(rev => {
                        let div = document.createElement('div');
                        div.className = "review-card";
                        div.innerHTML = `
                            <div class="review-header">
                                <span class="review-user">👤 @${rev.u}</span>
                                <span class="review-stars">⭐⭐⭐⭐⭐</span>
                            </div>
                            <div class="review-text">${rev.t}</div>
                            ${rev.i ? `<img src="${rev.i}" class=\"review-img\" alt=\"Фото\">` : ''}
                            <div class="review-meta">
                                <span>📍 ${rev.r}</span>
                                <span>🔒 Заказ проверен</span>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => {
                    console.log(err);
                    container.innerHTML = "<p style='color:var(--danger); font-size:12px;'>Не удалось загрузить живые отзывы с сервера. Проверьте статус HTTPS.</p>";
                });
        }

        initCities();
    </script>
</body>
</html>
