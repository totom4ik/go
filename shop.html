<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYTEX SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; font-size: 24px; text-transform: uppercase; }
        
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); border-color: #00d4ff; }
        .price { color: #00d4ff; font-weight: bold; margin: 10px 0; display: block; }
        
        .buy-btn {
            background: #00d4ff;
            color: #000;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💎 KRYTEX SHOP 💎</h1>
    </div>

    <div class="product-grid">
        <div class="card" onclick="buy('МЕФ VHQ 1г', 15000)">
            <strong>МЕФ VHQ</strong>
            <span class="price">15 000 ₸</span>
            <button class="buy-btn">В корзину</button>
        </div>
        <div class="card" onclick="buy('Шишки 1г', 12500)">
            <strong>Шишки</strong>
            <span class="price">12 500 ₸</span>
            <button class="buy-btn">В корзину</button>
        </div>
        <!-- Можно добавить остальные товары по аналогии -->
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("ЗАКРЫТЬ МАГАЗИН");
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());

        function buy(name, price) {
            tg.sendData(`buy:${name}:${price}`);
        }
    </script>
</body>
</html>
