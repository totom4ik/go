<script>
        let tg = window.Telegram.WebApp; 
        tg.expand();
        
        let selectedCity = "";
        let selectedDistrict = "";
        let selectedProduct = null;

        // --- УМНОЕ ОПРЕДЕЛЕНИЕ КЛИЕНТА (ИЗ WEBAPP ИЛИ ИЗ URL ССЫЛКИ) ---
        let currentUserId = 0;
        let currentUsername = "Аноним";

        function parseUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Пробуем стандартный метод Telegram
            try {
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    let u = tg.initDataUnsafe.user;
                    currentUserId = u.id;
                    currentUsername = u.username ? '@' + u.username : (u.first_name + ' ' + (u.last_name || '')).trim();
                    return;
                }
            } catch(e) { console.log("InitData context missing:", e); }

            // 2. Резервный метод: читаем из URL-параметров, переданных ботом
            if (urlParams.has('tg_id')) currentUserId = urlParams.get('tg_id');
            if (urlParams.has('tg_user')) currentUsername = decodeURIComponent(urlParams.get('tg_user'));
        }
        
        // Запускаем парсер сразу при загрузке страницы
        parseUrlParams();

        // Настройка отображения данных в Личном Кабинете витрины
        try {
            document.getElementById('u-name').innerText = currentUsername;
            document.getElementById('u-id').innerText = currentUserId !== 0 ? currentUserId : "Не определен";
        } catch(e) {}
        
        // --- ДАННЫЕ ГОРОДОВ НА РУССКОМ ---
        const districtsData = {
            "Астана": ["Есильский р-н", "Алматы р-н", "Сарыарка р-н", "Байконур р-н", "Нура р-н"],
            "Алматы": ["Медеуский р-н", "Алмалинский р-н", "Бостандыкский р-н", "Ауэзовский р-н", "Жетысуский р-н", "Турксибский р-н"],
            "Алаколь": ["Центральный пляж", "Курортная зона", "Побережье"],
            "Бесагаш": ["Нижняя зона", "Верхняя зона", "Въезд"],
            "Актау": ["1-15 микрорайоны", "16-30 микрорайоны", "Прибрежный р-н", "Верхняя зона"],
            "Актобе": ["Старый город", "11-12 микрорайоны", "Район Шанхай", "Болашак / Сазда"],

            "Семей": ["Центр", "Новостройка", "Левый берег", "Океан"],
            "Саран": ["Центральный р-н", "Шахтерский поселок"],
            "Жезказган": ["Площадь", "Прибрежный", "МКР Космонавтов"],
            "Павлодар": ["Химгородки", "Усолка", "Дачный", "Диспетчерская", "Центр"],
            "Экибастуз": ["1-й Южный", "2-й Южный", "Центральный"],
            "Костанай": ["КЖБИ", "Центр", "Западный", "Северо-Запад"],
            "Шымкент": ["Аль-Фараби р-н", "Абайский р-н", "Енбекшинский р-н", "Каратауский р-н"],
            "Тараз": ["1-6 микрорайоны", "7-12 микрорайоны", "Химпоселок", "Центр"],
            "Кызылорда": ["Шугла", "Арай", "Титов", "Центр"],
            "Аксу": ["Старый город", "Центральный р-н"]
        };

        // --- ТОВАРЫ СО СМАЙЛИКАМИ ---
        const productsData = {
            "Астана": [
                {n:"💎 MEOW NEW CRYS", p:"18.000 ₸", w:"1г"},
                {n:"⚡ BIG MEOW", p:"15.000 ₸", w:"1г"},
                {n:"🧪 MEOW", p:"18.000 ₸", w:"1г"},
                {n:"💊 MDMA", p:"20.000 ₸", w:"0.5г"},
                {n:"❄️ COCAINE", p:"80.000 ₸", w:"1г"},
                {n:"🌀 KETAMIN", p:"15.000 ₸", w:"0.5г"},
                {n:"👁 LSD", p:"20.000 ₸", w:"1шт"},
                {n:"🍯 WAX", p:"19.000 ₸", w:"0.5г"},
                {n:"🍁 Styx OG SORT", p:"26.000 ₸", w:"1г"},
                {n:"🔮 EXTAZY", p:"20.000 ₸", w:"1шт"}
            ],
            "Алматы": [
                {n:"💎 MEOW", p:"18.000 ₸", w:"1г"},
                {n:"🍫 HASH", p:"15.000 ₸", w:"2г"},
                {n:"🍯 WAX", p:"19.000 ₸", w:"0.5г"},
                {n:"🍁 Styx OG SORT", p:"23.000 ₸", w:"1г"}
            ],
            "Алаколь": [{n:"💎 MEOW", p:"23.000 ₸", w:"1г"}],
            "Бесагаш": [
                {n:"💎 MEOW", p:"19.000 ₸", w:"1г"},
                {n:"🍫 HASH", p:"9.000 ₸", w:"1г"}
            ],
            "Актау": [{n:"💎 MEOW", p:"24.000 ₸", w:"1г"}],
            "Актобе": [
                {n:"💎 MEOW", p:"22.000 ₸", w:"1г"},
                {n:"⚡ AMFETAMIN", p:"18.000 ₸", w:"1г"},
                {n:"💊 MDMA", p:"30.000 ₸", w:"0.5г"},
                {n:"👁 LSD", p:"25.000 ₸", w:"1шт"}
            ],
            "Атырау": [{n:"💎 MEOW", p:"26.000 ₸", w:"1г"}],
            "Караганда": [
                {n:"💎 MEOW", p:"18.000 ₸", w:"1г"},
                {n:"🍫 HASH", p:"18.000 ₸", w:"1г"}
            ],
            "Темиртау": [{n:"💎 MEOW", p:"19.000 ₸", w:"1г"}],
            "Семей": [
                {n:"💎 MEOW", p:"30.000 ₸", w:"1г"},
                {n:"🍁 Styx OG SORT", p:"28.000 ₸", w:"1г"}
            ],
            "Саран": [{n:"💎 MEOW", p:"20.000 ₸", w:"1г"}],
            "Жезказган": [{n:"💎 MEOW", p:"20.000 ₸", w:"1г"}],
            "Павлодар": [
                {n:"💎 MEOW NEW CRYS", p:"18.000 ₸", w:"1г"},
                {n:"🌀 KETAMIN", p:"15.000 ₸", w:"0.5г"},
                {n:"🍫 HASH", p:"15.000 ₸", w:"1г"}
            ],
            "Экибастуз": [{n:"💎 MEOW", p:"22.000 ₸", w:"1г"}],
            "Костанай": [{n:"💊 MDMA", p:"15.000 ₸", w:"0.5г"}],
            "Шымкент": [{n:"💎 MEOW", p:"18.000 ₸", w:"1г"}],
            "Тараз": [{n:"💎 MEOW", p:"22.000 ₸", w:"1г"}],
            "Кызылорда": [{n:"💊 XANAX", p:"20.000 ₸", w:"3шт"}],
            "Аксу": [{n:"💎 MEOW", p:"22.000 ₸", w:"1г"}]
        };

        // Исправленная отправка логов
        function logAction(actionText) {
            fetch('https://aida-reviews.duckdns.org/api/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: currentUserId, user: currentUsername, log: actionText })
            }).catch(e => console.log(e));
        }

        // Рендеринг городов
        function initCities() {
            const container = document.getElementById('city-list');
            container.innerHTML = "";
            Object.keys(districtsData).forEach(city => {
                let div = document.createElement('div');
                div.className = "card-item";
                div.innerText = "🏙 " + city;
                div.onclick = () => selectCity(city);
                container.appendChild(div);
            });
        }

        function selectCity(city) {
            selectedCity = city;
            logAction(`Выбрал город: ${city}`);
            document.getElementById('t-city').innerText = `📍 ${city.toUpperCase()} — ВЫБЕРИТЕ РАЙОН`;
            
            const container = document.getElementById('dist-list');
            container.innerHTML = "";
            districtsData[city].forEach(dist => {
                let div = document.createElement('div');
                div.className = "card-item";
                div.innerText = "🏘 " + dist;
                div.onclick = () => selectDistrict(dist);
                container.appendChild(div);
            });

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function selectDistrict(dist) {
            selectedDistrict = dist;
            logAction(`Выбрал район: ${dist} в городе ${selectedCity}`);
            document.getElementById('t-dist').innerText = `🎁 ${selectedCity} / ${dist}`;
            
            const container = document.getElementById('prod-list');
            container.innerHTML = "";
            
            let prods = productsData[selectedCity] || productsData["Алматы"];
            
            prods.forEach(p => {
                let card = document.createElement('div');
                card.className = "prod-card";
                card.innerHTML = `
                    <div class="prod-info">
                        <span class="prod-name">${p.n}</span>
                        <span class="prod-weight">⚖️ Вес: ${p.w} | 📦 Клад: Готовый</span>
                    </div>
                    <div style="text-align: right;">
                        <div class="prod-price">${p.p}</div>
                        <button class="btn-buy" onclick="startPay('${p.n}', '${p.p}')">Купить</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
        }

        function startPay(name, price) {
            selectedProduct = { n: name, p: price };
            logAction(`Нажал "Купить" на товар: ${name} (${price})`);
            document.getElementById('pay-name').innerHTML = `<b>Товар:</b> ${name}<br><b>Локация:</b> ${selectedCity}, ${selectedDistrict}`;
            document.getElementById('pay-sum').innerText = price;

            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-4').classList.remove('hidden');
        }

        function goBack(step) {
            if(step === 1) {
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-1').classList.remove('hidden');
            } else if(step === 2) {
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            } else if(step === 3) {
                document.getElementById('step-4').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
            }
        }

        function finish() {
            logAction(`Нажал кнопку "Я оплатил" для товара: ${selectedProduct.n}`);
            let outData = `DONE|${selectedCity}|${selectedDistrict}|${selectedProduct.n}|${selectedProduct.p}`;
            tg.sendData(outData);
            tg.close();
        }

        function switchView(view, el) {
            document.getElementById('shop-view').classList.add('hidden');
            document.getElementById('prof-view').classList.add('hidden');
            document.getElementById('reviews-view').classList.add('hidden');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');

            if(view === 'shop') {
                document.getElementById('shop-view').classList.remove('hidden');
            } else if(view === 'prof') {
                document.getElementById('prof-view').classList.remove('hidden');
                logAction("Открыл вкладку 'Профиль'");
            } else if(view === 'reviews') {
                document.getElementById('reviews-view').classList.remove('hidden');
                logAction("Открыл вкладку 'Отзывы'");
                loadReviewsFromServer();
            }
        }

        function loadReviewsFromServer() {
            const container = document.getElementById('reviews-list');
            container.innerHTML = "<p style='color:var(--dim); font-size:12px;'>Загрузка отзывы...</p>";

            fetch('https://aida-reviews.duckdns.org/api/reviews')
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = "";
                    if(!data || data.length === 0) {
                        container.innerHTML = "<p style='color:var(--dim); font-size:12px;'>Отзывов пока нет. Станьте первым!</p>";
                        return;
                    }
                    data.forEach(rev => {
                        let div = document.createElement('div');
                        div.className = "review-card";
                        div.innerHTML = `
                            <div class="review-header">
                                <span class="review-user">👤 @${rev.u}</span>
                                <span class="review-stars">⭐⭐⭐⭐⭐</span>
                            </div>
                            <div class="review-text">${rev.t}</div>
                            ${rev.i ? `<img src="${rev.i}" class="review-img" alt="Фото товара">` : ''}
                            <div class="review-meta">
                                <span>📍 ${rev.r}</span>
                                <span>🔒 Заказ проверен</span>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => {
                    console.log(err);
                    container.innerHTML = "<p style='color:var(--danger); font-size:12px;'>Не удалось загрузить живые отзывы с сервера. Проверьте статус HTTPS.</p>";
                });
        }

        initCities();
    </script>
